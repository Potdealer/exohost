name = "mfer-one-email"
main = "email-worker.js"
compatibility_date = "2024-01-01"
account_id = "51f3f8b54088094bb9555609cf8da36c"

[vars]
# No sensitive vars — secrets set via: npx wrangler secret put <NAME> -c wrangler-email.toml
# Required secrets:
#   EMAIL_API_KEY   — auth token for API access (X-Api-Key header)
#   FALLBACK_EMAIL  — backup forwarding address (optional)

# KV namespace binding
# Create with: npx wrangler kv namespace create "EMAIL_KV" -c wrangler-email.toml
# Then paste the returned id below
[[kv_namespaces]]
binding = "EMAIL_KV"
id = "3939a8f1e7594a92bc72196e69eb1d08"

# Email routing configuration
# After deploying:
# 1. Go to Cloudflare dashboard > mfer.one > Email > Email Routing
# 2. Enable Email Routing (adds MX records automatically)
# 3. Add catch-all rule: *@mfer.one -> Send to Worker -> mfer-one-email
